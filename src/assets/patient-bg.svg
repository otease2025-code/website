<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Yellow background -->
  <rect width="400" height="400" fill="#FFF9E6"/>
  
  <!-- Decorative elements -->
  <!-- Pink circle with person -->
  <circle cx="100" cy="80" r="50" fill="#FFB6D9" opacity="0.8"/>
  <circle cx="100" cy="80" r="45" fill="#FFC0E0"/>
  
  <!-- Purple circle with person -->
  <circle cx="280" cy="60" r="45" fill="#E8D5F2"/>
  
  <!-- Yellow sun -->
  <circle cx="320" cy="200" r="35" fill="#FFD700"/>
  
  <!-- Pink/purple circle -->
  <circle cx="80" cy="250" r="55" fill="#FF99CC"/>
  
  <!-- Wavy bottom section -->
  <path d="M 0 300 Q 100 280 200 300 T 400 300 L 400 400 L 0 400 Z" fill="#E0F7FF" opacity="0.6"/>
  
  <!-- Decorative flowers and shapes -->
  <circle cx="50" cy="150" r="8" fill="#FF6B9D"/>
  <circle cx="45" cy="145" r="6" fill="#FF6B9D"/>
  <circle cx="55" cy="145" r="6" fill="#FF6B9D"/>
  <circle cx="50" cy="155" r="6" fill="#FF6B9D"/>
  
  <!-- Small decorative elements -->
  <circle cx="350" cy="120" r="4" fill="#6B5BFF"/>
  <circle cx="360" cy="130" r="3" fill="#6B5BFF"/>
</svg>
